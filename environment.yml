name: oncopep

channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core scientific computing
  - numpy
  - pandas
  - scipy
  - scikit-learn

  # Visualization
  - matplotlib
  - seaborn

  # Machine learning / deep learning
  - pytorch

  # Bioinformatics / cheminformatics
  - biopython
  - rdkit

  # Utilities
  - jupyter
  - ipykernel
  - pyyaml
  - tqdm
  - networkx

  # Optional pip-only dependencies
  - pip:
      - openpyxl
